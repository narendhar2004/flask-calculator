<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flask Calculator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="calculator">

<h2>
Simple Calculator
<span id="historyToggle" class="history-icon">🕘</span>
</h2>

<form>

<input id="display" type="text" name="expression" class="display" value="{{ expression }}">

<div id="historyPanel" class="history-panel">

<div class="history-header">
History
<button type="button" id="clearHistory" class="clear-history">Clear</button>
</div>

<div id="history" class="history-list"></div>

</div>

<div class="buttons">

<button type="button" onclick="addToDisplay('7')">7</button>
<button type="button" onclick="addToDisplay('8')">8</button>
<button type="button" onclick="addToDisplay('9')">9</button>
<button type="button" class="operator" onclick="addToDisplay('/')">/</button>

<button type="button" onclick="addToDisplay('4')">4</button>
<button type="button" onclick="addToDisplay('5')">5</button>
<button type="button" onclick="addToDisplay('6')">6</button>
<button type="button" class="operator" onclick="addToDisplay('*')">*</button>

<button type="button" onclick="addToDisplay('1')">1</button>
<button type="button" onclick="addToDisplay('2')">2</button>
<button type="button" onclick="addToDisplay('3')">3</button>
<button type="button" class="operator" onclick="addToDisplay('-')">-</button>

<button type="button" onclick="clearDisplay()">C</button>
<button type="button" onclick="addToDisplay('0')">0</button>
<button type="button" onclick="addToDisplay('.')">.</button>
<button type="button" class="operator" onclick="addToDisplay('+')">+</button>

<button type="button" class="equal full-width" onclick="calculate()">=</button>

</div>

</form>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

const display = document.getElementById("display");
const historyPanel = document.getElementById("historyPanel");
const historyToggle = document.getElementById("historyToggle");
const historyList = document.getElementById("history");
const clearHistoryBtn = document.getElementById("clearHistory");

const operators = "+-*/";

let historyData = [];

adjustFontSize();


// Toggle History Panel
historyToggle.addEventListener("click", function () {
    historyPanel.classList.toggle("open");
});


// Clear History
clearHistoryBtn.addEventListener("click", function (event) {

event.preventDefault();

if (confirm("Clear all calculation history?")) {

historyData = [];
historyList.innerHTML = "";

}

});


// Render History
function renderHistory() {

historyList.innerHTML = "";

historyData.forEach(item => {

const div = document.createElement("div");

div.textContent = `${item.expression} = ${item.result}`;

div.addEventListener("click", function () {

display.value = item.result;
adjustFontSize();
historyPanel.style.display = "none";

});

historyList.appendChild(div);

});

}


// Auto Font Resize
function adjustFontSize() {

const maxFontSize = 28;
const minFontSize = 14;

display.style.fontSize = maxFontSize + "px";

while (
display.scrollWidth > display.clientWidth &&
parseFloat(display.style.fontSize) > minFontSize
) {

display.style.fontSize =
(parseFloat(display.style.fontSize) - 1) + "px";

}

}


// Add Number / Operator
window.addToDisplay = function(value){

const currentValue = display.value;

if(value === "."){

const parts = currentValue.split(/[\+\-\*\/]/);
const lastNumber = parts[parts.length - 1];

if(lastNumber.includes(".")) return;

}

display.value += value;

adjustFontSize();

};


// Clear Display
window.clearDisplay = function(){

display.value = "";

adjustFontSize();

};


// Calculate (AJAX)
window.calculate = function(){

fetch("/calculate", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
expression: display.value
})

})

.then(response => response.json())

.then(data => {

if(data.result !== undefined){

historyData.push({

expression: display.value,
result: data.result

});

renderHistory();

display.value = data.result;

adjustFontSize();

}

})

.catch(() => {

display.value = "Error";

});

};


// Keyboard Support
document.addEventListener("keydown", function(event){

const key = event.key;

const allowedKeys = "0123456789+-*/.";

if(allowedKeys.includes(key)){

event.preventDefault();

const currentValue = display.value;

const lastChar = currentValue.slice(-1);

if(!isNaN(key)){

display.value += key;

}else if(operators.includes(key)){

if(currentValue === "" && key !== "-") return;

if(operators.includes(lastChar)) return;

display.value += key;

}else if(key === "."){

display.value += key;

}

adjustFontSize();

}

else if(key === "Enter"){

event.preventDefault();

calculate();

}

else if(key === "Backspace"){

event.preventDefault();

display.value = display.value.slice(0, -1);

adjustFontSize();

}

else if(key === "Escape"){

event.preventDefault();

display.value = "";

adjustFontSize();

}

else{

event.preventDefault();

}

});

});

</script>

</body>
</html>
